<svg xmlns="http://www.w3.org/2000/svg" width="1280" height="440" viewBox="0 0 1280 440" font-family="'Open Sans','Liberation Sans',sans-serif">
  <defs>
    <radialGradient id="glowG" cx="20%" cy="28%" r="62%">
      <stop offset="0%" stop-color="#4ade80" stop-opacity="0.17"/>
      <stop offset="55%" stop-color="#4ade80" stop-opacity="0.04"/>
      <stop offset="100%" stop-color="#4ade80" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="glowWarm" cx="94%" cy="90%" r="55%">
      <stop offset="0%" stop-color="#f97316" stop-opacity="0.10"/>
      <stop offset="100%" stop-color="#f97316" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="topbar" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#4ade80" stop-opacity="0"/>
      <stop offset="35%" stop-color="#4ade80" stop-opacity="0.9"/>
      <stop offset="70%" stop-color="#22c55e" stop-opacity="0.5"/>
      <stop offset="100%" stop-color="#4ade80" stop-opacity="0"/>
    </linearGradient>
    <linearGradient id="under" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#4ade80" stop-opacity="0.95"/>
      <stop offset="100%" stop-color="#4ade80" stop-opacity="0"/>
    </linearGradient>
    <filter id="soft" x="-60%" y="-60%" width="220%" height="220%">
      <feGaussianBlur stdDeviation="6" result="b"/>
      <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <rect width="1280" height="440" fill="#0a0a0b"/>
  <rect width="1280" height="440" fill="url(#glowG)"/>
  <rect width="1280" height="440" fill="url(#glowWarm)"/>
  <rect width="1280" height="4" fill="url(#topbar)"/>

  <!-- dumbbell icon -->
  <g transform="translate(96,74) scale(1.5)" fill="#4ade80" filter="url(#soft)">
    <rect x="18" y="29" width="28" height="6" rx="3"/>
    <rect x="11" y="22" width="7" height="20" rx="3"/>
    <rect x="46" y="22" width="7" height="20" rx="3"/>
    <rect x="3" y="17" width="8" height="30" rx="3"/>
    <rect x="53" y="17" width="8" height="30" rx="3"/>
  </g>

  <!-- title -->
  <text x="198" y="146" font-size="78" font-weight="800" letter-spacing="-1.5" fill="#f2f3f4">Mi Rutina Gym</text>
  <rect x="200" y="168" width="420" height="4" rx="2" fill="url(#under)"/>

  <!-- tagline -->
  <text x="98" y="232" font-size="29" font-weight="400" fill="#9aa0a6">Tu semana de entreno, sin fricci&#243;n.</text>
  <text x="98" y="270" font-size="29" font-weight="400" fill="#6b7177">Una pantalla &#183; cero cuentas &#183; todo local.</text>

  <!-- feature tag pills -->
  <g font-size="18" font-weight="600" fill="#4ade80">
    <g transform="translate(98,304)">
      <rect width="118" height="36" rx="18" fill="#4ade80" fill-opacity="0.08" stroke="#4ade80" stroke-opacity="0.28"/>
      <text x="59" y="24" text-anchor="middle">single-file</text>
    </g>
    <g transform="translate(228,304)">
      <rect width="134" height="36" rx="18" fill="#4ade80" fill-opacity="0.08" stroke="#4ade80" stroke-opacity="0.28"/>
      <text x="67" y="24" text-anchor="middle">offline-first</text>
    </g>
    <g transform="translate(374,304)">
      <rect width="186" height="36" rx="18" fill="#4ade80" fill-opacity="0.08" stroke="#4ade80" stroke-opacity="0.28"/>
      <text x="93" y="24" text-anchor="middle">cero dependencias</text>
    </g>
  </g>

  <!-- week strip (mirrors the app's day nav) -->
  <g transform="translate(772,182)" text-anchor="middle" font-size="23" font-weight="700">
    <text x="232" y="-22" font-size="16" font-weight="700" fill="#5a6066" letter-spacing="2">TU SEMANA</text>
    <g transform="translate(0,0)"><rect width="56" height="72" rx="18" fill="#ffffff" fill-opacity="0.04" stroke="#ffffff" stroke-opacity="0.07"/><circle cx="28" cy="22" r="5" fill="#eab308"/><text x="28" y="52" fill="#d6dade">L</text></g>
    <g transform="translate(68,0)"><rect width="56" height="72" rx="18" fill="#ffffff" fill-opacity="0.04" stroke="#ffffff" stroke-opacity="0.07"/><circle cx="28" cy="22" r="5" fill="#a855f7"/><text x="28" y="52" fill="#d6dade">M</text></g>
    <g transform="translate(136,0)"><rect width="56" height="72" rx="18" fill="#ffffff" fill-opacity="0.04" stroke="#ffffff" stroke-opacity="0.07"/><circle cx="28" cy="22" r="5" fill="#14b8a6"/><text x="28" y="52" fill="#d6dade">M</text></g>
    <g transform="translate(204,0)"><rect width="56" height="72" rx="18" fill="#4ade80" fill-opacity="0.10" stroke="#4ade80" stroke-opacity="0.45"/><circle cx="28" cy="22" r="5" fill="#f97316"/><text x="28" y="52" fill="#eafff1">J</text></g>
    <g transform="translate(272,0)"><rect width="56" height="72" rx="18" fill="#ffffff" fill-opacity="0.04" stroke="#ffffff" stroke-opacity="0.07"/><circle cx="28" cy="22" r="5" fill="#3b82f6"/><text x="28" y="52" fill="#d6dade">V</text></g>
    <g transform="translate(340,0)"><rect width="56" height="72" rx="18" fill="#ffffff" fill-opacity="0.04" stroke="#ffffff" stroke-opacity="0.07"/><circle cx="28" cy="22" r="5" fill="#a855f7"/><text x="28" y="52" fill="#d6dade">S</text></g>
    <g transform="translate(408,0)"><rect width="56" height="72" rx="18" fill="#ffffff" fill-opacity="0.04" stroke="#ffffff" stroke-opacity="0.07"/><circle cx="28" cy="22" r="5" fill="#6b7280"/><text x="28" y="52" fill="#9aa0a6">D</text></g>
    <text x="232" y="104" font-size="16" font-weight="600" fill="#5a6066" letter-spacing="0.5">check-off que se reinicia cada semana</text>
  </g>
</svg>
